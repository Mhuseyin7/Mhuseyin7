<svg width="880" height="240" viewBox="0 0 880 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="880" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="0.5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="880" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#120b2e"/>
      <stop offset="1" stop-color="#03121f"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <mask id="typeReveal">
      <rect x="46" y="146" width="0" height="34" fill="#ffffff">
        <animate attributeName="width" from="0" to="470" dur="2.6s" begin="1.1s" fill="freeze"/>
      </rect>
    </mask>
  </defs>

  <!-- panel -->
  <rect x="1.5" y="1.5" width="877" height="237" rx="16" fill="url(#bg)" stroke="url(#neon)" stroke-width="2"/>

  <!-- faint grid -->
  <g stroke="#a855f7" stroke-width="1" opacity="0.06">
    <line x1="0" y1="60" x2="880" y2="60"/>
    <line x1="0" y1="120" x2="880" y2="120"/>
    <line x1="0" y1="180" x2="880" y2="180"/>
    <line x1="176" y1="0" x2="176" y2="240"/>
    <line x1="352" y1="0" x2="352" y2="240"/>
    <line x1="528" y1="0" x2="528" y2="240"/>
    <line x1="704" y1="0" x2="704" y2="240"/>
  </g>

  <!-- floating bits -->
  <g font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#a855f7">
    <text x="70" y="220" opacity="0">01
      <animate attributeName="opacity" values="0;0.35;0" dur="6s" begin="0s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -140" dur="6s" begin="0s" repeatCount="indefinite"/>
    </text>
    <text x="230" y="230" opacity="0">10
      <animate attributeName="opacity" values="0;0.3;0" dur="7.5s" begin="1.2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -160" dur="7.5s" begin="1.2s" repeatCount="indefinite"/>
    </text>
    <text x="610" y="225" opacity="0" fill="#22d3ee">11
      <animate attributeName="opacity" values="0;0.3;0" dur="6.8s" begin="0.6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -150" dur="6.8s" begin="0.6s" repeatCount="indefinite"/>
    </text>
    <text x="760" y="235" opacity="0">00
      <animate attributeName="opacity" values="0;0.35;0" dur="8s" begin="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -170" dur="8s" begin="2s" repeatCount="indefinite"/>
    </text>
    <text x="440" y="228" opacity="0" fill="#22d3ee">01
      <animate attributeName="opacity" values="0;0.28;0" dur="7s" begin="3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -150" dur="7s" begin="3s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- corner tag -->
  <text x="836" y="34" text-anchor="end" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#38bdf8" opacity="0.55">// self-healing systems</text>

  <!-- name -->
  <text x="46" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="41" font-weight="800" fill="url(#neon)" filter="url(#glow)" opacity="0">Muhammed Koca
    <animate attributeName="opacity" from="0" to="1" dur="1.1s" begin="0.1s" fill="freeze"/>
  </text>

  <!-- subtitle -->
  <text x="46" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#94a3b8" opacity="0">Full-Stack Architect · Enterprise Web Developer · Bursa, Türkiye
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0.6s" fill="freeze"/>
  </text>

  <!-- typing terminal line -->
  <g mask="url(#typeReveal)" font-family="Consolas, 'Courier New', monospace" font-size="16">
    <text x="46" y="168"><tspan fill="#34d399">$</tspan><tspan fill="#e2e8f0"> ./system --heal</tspan><tspan fill="#64748b">  →</tspan><tspan fill="#22d3ee"> self-healing: </tspan><tspan fill="#34d399" font-weight="700">ACTIVE ✓</tspan></text>
  </g>
  <rect x="50" y="154" width="9" height="18" fill="#22d3ee">
    <animate attributeName="x" from="50" to="520" dur="2.6s" begin="1.1s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- heartbeat line -->
  <path d="M0 205 L120 205 L133 205 L143 184 L153 223 L163 205 L330 205 L343 205 L353 182 L363 224 L373 205 L540 205 L553 205 L563 184 L573 223 L583 205 L750 205 L763 205 L773 183 L783 224 L793 205 L880 205"
        stroke="url(#neon)" stroke-width="2.2" fill="none" filter="url(#glow)"
        stroke-dasharray="980" stroke-dashoffset="980">
    <animate attributeName="stroke-dashoffset" values="980;0;-980" keyTimes="0;0.5;1" dur="7s" repeatCount="indefinite"/>
  </path>
</svg>
