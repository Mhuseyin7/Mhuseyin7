<svg width="880" height="14" viewBox="0 0 880 14" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dg" x1="0" y1="0" x2="880" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#6366f1" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <filter id="dglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <line x1="0" y1="7" x2="880" y2="7" stroke="url(#dg)" stroke-width="1.5"/>
  <circle cy="7" r="3" fill="#22d3ee" filter="url(#dglow)">
    <animate attributeName="cx" values="0;880;0" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="#22d3ee;#a855f7;#22d3ee" dur="9s" repeatCount="indefinite"/>
  </circle>
</svg>
