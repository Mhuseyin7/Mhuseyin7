<svg width="420" height="200" viewBox="0 0 420 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="420" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="0.5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="420" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#120b2e"/>
      <stop offset="1" stop-color="#03121f"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="1.5" y="1.5" width="417" height="197" rx="14" fill="url(#bg)" stroke="url(#neon)" stroke-width="1.6"/>
  <text x="396" y="28" text-anchor="end" font-family="Consolas, monospace" font-size="11" fill="#22d3ee" opacity="0.55">GENEL BAKIŞ</text>
  
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.00s" fill="freeze"/>
      <text x="105.0" y="60.0" text-anchor="middle" font-size="22">📈</text>
      <text x="105.0" y="86.0" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="url(#neon)" filter="url(#glow)">71</text>
      <text x="105.0" y="104.0" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#94a3b8">Katkı (1 yıl)</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.12s" fill="freeze"/>
      <text x="315.0" y="60.0" text-anchor="middle" font-size="22">📦</text>
      <text x="315.0" y="86.0" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="url(#neon)" filter="url(#glow)">3</text>
      <text x="315.0" y="104.0" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#94a3b8">Repository</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.24s" fill="freeze"/>
      <text x="105.0" y="140.0" text-anchor="middle" font-size="22">⭐</text>
      <text x="105.0" y="166.0" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="url(#neon)" filter="url(#glow)">0</text>
      <text x="105.0" y="184.0" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#94a3b8">Yıldız</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.36s" fill="freeze"/>
      <text x="315.0" y="140.0" text-anchor="middle" font-size="22">🧑‍🤝‍🧑</text>
      <text x="315.0" y="166.0" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="url(#neon)" filter="url(#glow)">0</text>
      <text x="315.0" y="184.0" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#94a3b8">Takipçi</text>
    </g>
<line x1="210.0" y1="30" x2="210.0" y2="180" stroke="#a855f7" stroke-opacity="0.16"/>
<line x1="30" y1="120.0" x2="390" y2="120.0" stroke="#a855f7" stroke-opacity="0.16"/>
</svg>