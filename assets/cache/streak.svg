<svg width="420" height="200" viewBox="0 0 420 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="420" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="0.5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="420" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#120b2e"/>
      <stop offset="1" stop-color="#03121f"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="1.5" y="1.5" width="417" height="197" rx="14" fill="url(#bg)" stroke="url(#neon)" stroke-width="1.6"/>
  <text x="396" y="28" text-anchor="end" font-family="Consolas, monospace" font-size="11" fill="#22d3ee" opacity="0.55">STREAK</text>
  
  <circle cx="105" cy="95" r="56" stroke="#a855f7" stroke-opacity="0.15" stroke-width="7" fill="none"/>
  <circle cx="105" cy="95" r="56" stroke="url(#neon)" stroke-width="7" fill="none"
          stroke-linecap="round" stroke-dasharray="351.9 351.9" filter="url(#glow)"
          transform="rotate(-90 105 95)">
    <animateTransform attributeName="transform" type="rotate" from="-90 105 95" to="270 105 95" dur="18s" repeatCount="indefinite"/>
  </circle>
  <text x="105" y="88" text-anchor="middle" font-size="24">🔥</text>
  <text x="105" y="124" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" fill="#e2e8f0">2</text>
  <text x="105" y="146" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#94a3b8">GÜNLÜK SERİ</text>

  <line x1="205" y1="34" x2="205" y2="170" stroke="#a855f7" stroke-opacity="0.18"/>

  <text x="312" y="76" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#94a3b8">En Uzun Seri</text>
  <text x="312" y="112" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="800" fill="url(#neon)" filter="url(#glow)">2</text>
  <text x="312" y="132" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#94a3b8">gün</text>

</svg>