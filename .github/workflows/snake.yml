# 🐍 Contribution Snake — katkı grafiğini yiyen yılan animasyonu üretir.
# Çıktı: "output" branch'ine snake.svg + snake-dark.svg olarak yazılır.
# README bu dosyalara raw.githubusercontent.com üzerinden bağlanır.

name: Generate Snake

on:
  schedule:
    - cron: "0 3 * * *" # her gece 03:00 UTC — günlük yenileme
  workflow_dispatch: # Actions sekmesinden elle çalıştırma
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
