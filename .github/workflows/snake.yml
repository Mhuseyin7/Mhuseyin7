# 🐍 Contribution Snake — mor-cyan özel paletli yılan animasyonu üretir.
# Çıktı: "output" branch'ine snake.svg + snake-dark.svg olarak yazılır.

name: Generate Snake

on:
  schedule:
    - cron: "0 3 * * *" # her gece 03:00 UTC
  workflow_dispatch: # elle çalıştırma
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?color_snake=#6366f1&color_dots=#ebedf0,#ddd6fe,#a78bfa,#7c3aed,#22d3ee
            dist/snake-dark.svg?palette=github-dark&color_snake=#22d3ee&color_dots=#161b22,#312e81,#6d28d9,#a855f7,#22d3ee

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
