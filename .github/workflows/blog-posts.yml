# ✍️ Son Yazılar — muhammedkoca.com.tr'nin RSS feed'inden son 3 yazıyı çeker ve
# her yazının KENDİ sayfasındaki og:image (kapak SVG) görselini kullanarak
# README'deki BLOG-CARDS:START/END işaretleri arasını günceller.
#
# Harici bir "readme blog list" action'ı yerine kendi scriptimizi (generate_blog_cards.py)
# kullanıyoruz çünkü Türkçe başlıkların URL-encode edilmesi standart action şablonlarıyla
# güvenilir yapılamıyor. Script hata alırsa README'ye DOKUNMAZ — eski kartlar kalır.

name: Update Blog Cards

on:
  schedule:
    - cron: "0 */6 * * *" # 6 saatte bir
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: blog-cards
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate blog cards
        run: python3 scripts/generate_blog_cards.py README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || (git commit -m "docs: son yazı kartları güncellendi 🤖" && git push)
