# 📊 Stats Cache — GitHub kartlarının TAMAMINI (stats, top-langs, streak, activity)
# indirip repoya kaydeder. Kartlar assets/cache/ altından yüklenir; hiçbiri dış
# servise bağımlı değildir — o servisler yavaşlasa/çökse bile profil bozulmaz.
# İndirme başarısız olursa eski önbellek olduğu gibi korunur.

name: Cache Stats Cards

on:
  schedule:
    - cron: "0 4 * * *" # her gece 04:00 UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: stats-cache
  cancel-in-progress: true

jobs:
  cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download cards (retry + validation)
        run: |
          mkdir -p assets/cache tmp
          fetch () {
            url="$1"; out="$2"
            for i in 1 2 3 4 5; do
              if curl -fsSL --max-time 30 "$url" -o "tmp/$out"; then
                if grep -q "<svg" "tmp/$out" && ! grep -qi "something went wrong" "tmp/$out"; then
                  mv "tmp/$out" "assets/cache/$out"
                  echo "✓ $out"
                  return 0
                fi
              fi
              echo "… deneme $i başarısız ($out), 20 sn bekleniyor"
              sleep 20
            done
            echo "✗ $out indirilemedi — mevcut önbellek korunuyor"
          }

          fetch "https://github-readme-stats.vercel.app/api?username=Mhuseyin7&show_icons=true&hide_border=true&bg_color=0d1117&title_color=a855f7&icon_color=22d3ee&text_color=c9d1d9&ring_color=a855f7&rank_icon=github&include_all_commits=true&custom_title=Muhammed+Koca" stats.svg

          fetch "https://github-readme-stats.vercel.app/api/top-langs/?username=Mhuseyin7&layout=compact&hide_border=true&bg_color=0d1117&title_color=a855f7&text_color=c9d1d9&langs_count=8&custom_title=En+Çok+Kullanılan+Diller" top-langs.svg

          fetch "https://streak-stats.demolab.com?user=Mhuseyin7&hide_border=true&background=0d1117&ring=a855f7&fire=22d3ee&currStreakLabel=a855f7&sideLabels=c9d1d9&currStreakNum=ffffff&sideNums=ffffff&dates=8b949e" streak.svg

          fetch "https://github-readme-activity-graph.vercel.app/graph?username=Mhuseyin7&bg_color=0d1117&color=c9d1d9&line=a855f7&point=22d3ee&area=true&hide_border=true&custom_title=Muhammed+Koca+%C2%B7+Katk%C4%B1+Grafi%C4%9Fi" activity.svg

      - name: Commit cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/cache
          git diff --cached --quiet || (git commit -m "chore: GitHub kartları önbelleğe alındı 🤖" && git push)
