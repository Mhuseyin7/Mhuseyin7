# 📊 Stats Cache — GitHub kartlarını (overview, streak, langs, activity) DOĞRUDAN
# GitHub'ın kendi API'sinden veri çekip scripts/generate_stats.py ile özgün SVG
# kartlara dönüştürür ve assets/cache/ altına kaydeder.
#
# ÖNEMLİ: Artık hiçbir dış render servisine (vercel.app, demolab.com vb.) bağımlı
# DEĞİLDİR. Tek bağımlılık api.github.com — GITHUB_TOKEN ile otomatik çalışır.
# Script bir hatayla karşılaşırsa assets/cache/ altındaki ESKİ dosyalara dokunmaz;
# yani bu workflow ne olursa olsun profildeki kartlar asla "kırık görsel" göstermez.

name: Cache Stats Cards

on:
  schedule:
    - cron: "0 4 * * *" # her gece 04:00 UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: stats-cache
  cancel-in-progress: true

jobs:
  cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate cards from GitHub API
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          GH_USERNAME: ${{ github.repository_owner }}
        run: python3 scripts/generate_stats.py assets/cache

      - name: Commit cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/cache
          git diff --cached --quiet || (git commit -m "chore: GitHub kartları güncellendi 🤖" && git push)
